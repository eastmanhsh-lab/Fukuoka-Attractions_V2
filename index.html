<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FUKUOKA ATTRACTIONS</title>
    <style>
        /* --- 🎨 [基石樣式 - 最終保護層] --- */
        :root { 
            --bg: #f2f0eb; --paper: #ffffff; --accent: #37474f; --glow: #78909c; --text: #455a64; --line: rgba(0,0,0,0.06);
            --palette-1: #8ba3a1; --palette-1-bg: #e9eeed;
            --palette-2: #a98b98; --palette-2-bg: #f2edf0;
            --palette-3: #9da98b; --palette-3-bg: #f0f2ed;
            --palette-4: #8b92a9; --palette-4-bg: #edf0f2;
            --palette-5: #a99a8b; --palette-5-bg: #f2f0ed;
            --danger: #ef5350;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding-top: 235px; color: var(--text); overflow-x: hidden; }

        /* 🚀 [修復 1] 強化所有按鈕按壓回饋 */
        .btn-bounce, .card, .action-btn, .text-btn, .filter-trigger, .close-btn, .pill, .tag-sec-header, .recom-sticker, .link-btn, .filter-header, .master-row, .split-num { 
            cursor: pointer; transition: transform 0.1s, background 0.2s, color 0.2s; 
        }
        .btn-bounce:active, .card:active, .action-btn:active, .pill:active, .link-btn:active, .recom-sticker:active, .split-num:active { 
            transform: translateY(1.5px) scale(0.96) !important; 
        }

        /* --- 🎨 Header & Status Bar --- */
        .header-fixed-container { position: fixed; top: 0; left: 0; width: 100%; background: var(--bg); z-index: 2000; padding-top: 20px; }
        .header-inner { max-width: 600px; margin: 0 auto; padding: 0 10px; }
        .app-title { margin: 0 0 12px 0; font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; text-align: center; }
        .nav-row { display: flex; align-items: center; gap: 8px; padding-bottom: 12px; }
        .search-pill-group { flex: 1; display: flex; background: var(--paper); padding: 4px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); align-items: center; border: 1px solid var(--line); height: 42px; min-width: 0; }
        .search-input { flex: 1; padding: 0 10px; border: none; font-size: 14px; background: transparent; color: var(--accent); outline: none; }
        .filter-trigger { background: var(--accent); color: white; padding: 8px 14px; border-radius: 10px; font-weight: 700; font-size: 12px; }
        .action-row { display: flex; justify-content: center; align-items: center; gap: 10px; flex-wrap: wrap; padding: 0 10px 12px 10px; max-width: 600px; margin: 0 auto; }
        .action-btn { background: var(--paper); border: 1.2px solid #d1d1d1; border-radius: 8px; padding: 8px 12px; font-size: 10px; font-weight: 800; color: var(--accent); text-transform: uppercase; }
        .status-bar { width: 100%; background: var(--bg); padding: 10px 5px; color: #90a4ae; font-weight: 700; font-size: 10px; border-top: 1px solid rgba(0,0,0,0.02); display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .status-item { white-space: nowrap; }

        /* --- 🎨 景點卡片 --- */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(165px, 1fr)); gap: 12px; padding: 12px; width: 100%; justify-content: center; }
        .card { width: 165px; height: 140px; background: var(--paper); border-radius: 18px; padding: 14px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); display: flex; flex-direction: column; position: relative; overflow: hidden; border: 1px solid var(--line); flex-shrink: 0; }
        .reg-rect-tag { position: absolute; top: 0; left: 0; padding: 4px 10px; border-bottom-right-radius: 10px; z-index: 2; font-size: 9px; font-weight: 900; color: white; }
        .recom-sticker { position: absolute; top: 8px; right: 8px; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: #fafafa; border: 1px solid #eee; z-index: 20; }
        .recom-sticker.rated { font-size: 14px; border: 1.5px solid var(--palette-2); background: var(--palette-2-bg); }
        .recom-sticker.empty { font-size: 8px; font-weight: 900; color: #ccc; border: 1.5px dashed #ccc; }
        
        .title-row { display: flex; align-items: center; gap: 6px; margin-top: 25px; z-index: 3; }
        .card-icon { font-size: 18px; flex-shrink: 0; }
        .name-cn { font-size: 15px; font-weight: 800; color: var(--accent); overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .name-en { font-size: 8.5px; color: #b0bec5; text-transform: uppercase; margin-bottom: 2px; padding-left: 24px; font-weight: 700; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .card-tag-row { display: none; padding-left: 24px; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
        .card-tag-row.active { display: flex; }
        .tag-mini-pill { font-size: 8px; font-weight: 900; color: var(--palette-2); background: var(--palette-2-bg); padding: 1px 6px; border-radius: 4px; border: 1px solid rgba(169, 139, 152, 0.2); }
        .card-bottom-text { font-size: 12px; color: #78909c; line-height: 1.4; padding-top: 8px; border-top: 1px solid #f5f5f5; margin-top: auto; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }

        /* --- 🏷️ Tag Dropdown --- */
        .tag-dropdown-wrapper { position: relative; width: 100%; margin-bottom: 15px; }
        .tag-select { appearance: none; background: #fff; border: 1.5px solid #eee; border-radius: 10px; padding: 10px 30px 10px 12px; font-size: 13px; font-weight: 800; color: #b0bec5; outline: none; width: 100%; cursor: pointer; transition: all 0.2s; }
        .tag-select.has-val { background: var(--palette-2-bg) !important; border-color: var(--palette-2) !important; color: var(--palette-2) !important; }
        .tag-dropdown-wrapper::after { content: "▼"; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 10px; color: inherit; pointer-events: none; }

        /* --- 🎨 Modals --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(55,71,79,0.15); z-index: 3000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: rgba(255,255,255,0.98); width: 92%; max-width: 420px; min-width: 320px; min-height: 60vh; border-radius: 25px; position: relative; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--line); }
        #my-cards-overlay .modal-content { width: 70vw !important; max-width: 900px; min-width: 380px !important; }
        .modal-body { padding: 25px; overflow-y: auto; flex: 1; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 22px; color: #cfd8dc; z-index: 100; font-weight: 900; }

        /* --- 🚀 TAGS MANAGEMENT --- */
        .tag-row { display: flex; align-items: center; gap: 10px; padding: 12px; background: #f9f9f7; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--line); }
        .tag-input { flex: 1; border: none; background: transparent; font-size: 14px; font-weight: 800; outline: none; padding: 8px; color: var(--accent); border-radius: 6px; transition: 0.2s; }
        .tag-input:not([readonly]) { background: white !important; box-shadow: inset 0 0 0 1.5px var(--accent); color: var(--accent); }
        .tag-edit-btn { font-size: 11px; font-weight: 900; color: var(--glow); text-transform: uppercase; min-width: 50px; text-align: right; }

        /* --- 🧪 Filter UI --- */
        .filter-section { background: #fff; border: 1px solid var(--line); border-radius: 12px; margin-bottom: 12px; padding: 0 12px; }
        .filter-header { height: 50px; display: flex; align-items: center; justify-content: space-between; }
        .filter-title { font-size: 13px !important; font-weight: 900; color: var(--accent); }
        .filter-expand-area { padding-bottom: 15px; display: none; }
        .filter-section.open .filter-expand-area { display: block; }
        .filter-arrow { font-size: 10px; color: var(--glow); transition: 0.3s; transform: rotate(0deg); display: inline-block; }
        .filter-section.open .filter-arrow { transform: rotate(90deg); }
        .master-row { background: var(--palette-5-bg); padding: 10px; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 800; color: var(--accent); }
        .pill-box { display: flex; flex-wrap: wrap; gap: 8px; }
        .pill { padding: 6px 12px; border-radius: 8px; background: #fdfdfb; border: 1px solid #e0e0e0; font-size: 11px; font-weight: 800; color: var(--text); }
        .pill.active { background: var(--accent) !important; color: white !important; border-color: var(--accent) !important; }
        /* 🚀 [修復] 選項冇色樣式 */
        .pill.disabled { opacity: 0.85; pointer-events: none; background: #f5f5f5 !important; color: #ccc !important; border-color: #eee !important; }

        /* --- 🎨 詳細內容與排版保護 --- */
        .layer-tags { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; white-space: nowrap; overflow: hidden; }
        /* 🚀 [修復] Detail 視窗 Tag 掣縮細 */
        .layer-tags .tag-dropdown-wrapper { width: 110px !important; margin-left: auto; margin-right: 30px; margin-bottom: 0; }
        .layer-tags .tag-select { padding: 2px 20px 2px 10px !important; font-size: 10.5px !important; height: 26px !important; border-radius: 8px !important; }

        .hash-tag { color: var(--glow); font-size: 12px; font-weight: 800; flex-shrink: 0; }
        .layer-title-row { display: flex; align-items: center; justify-content: flex-start; gap: 8px; margin-bottom: 20px; }
        .det-cn { font-size: 28px; font-weight: 900; color: var(--accent); line-height: 1.1; }
        .det-en { font-size: 14px; color: #b0bec5; font-weight: 700; text-transform: uppercase; }
        .det-info-line { font-size: 13px; margin-bottom: 8px; font-weight: 700; color: var(--text); }
        .det-links-row { display: flex; gap: 10px; margin: 20px 0; }
        .link-btn { flex: 1; text-align: center; padding: 14px; border-radius: 12px; font-weight: 800; text-decoration: none; font-size: 12px; height: 50px; display: flex; align-items: center; justify-content: center; }
        .link-nav { background: var(--accent); color: white; }
        .link-ref { border: 2px solid var(--accent); color: var(--accent); }
        .det-points-simple { font-size: 13px; padding: 12px; background: #f9f9f7; border-radius: 10px; font-weight: 700; margin-bottom: 15px; }
        .det-intro { font-size: 14px; line-height: 1.7; color: var(--text); }

        /* 🚀 [修復] Split-button 互動 */
        .split-link-btn { display: flex; flex-direction: column; padding: 0 !important; overflow: hidden; background: white; border: 2.5px solid var(--accent); }
        .split-top { font-size: 9px; height: 18px; width: 100%; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid rgba(55,71,79,0.15); color: var(--accent); font-weight: 900; background: #fdfdfb; }
        .split-bottom { display: flex; flex: 1; width: 100%; }
        .split-num { flex: 1; display: flex; align-items: center; justify-content: center; text-decoration: none; color: var(--accent); font-size: 14px; font-weight: 800; border-right: 2px solid rgba(55,71,79,0.1); }
        .split-num:last-child { border-right: none; }
        .split-num:hover { background: var(--palette-2-bg); color: var(--palette-2); }
	/* 🚀 [修復版] ADD & EDIT 視窗表單專屬樣式 */
.form-group { margin-bottom: 16px; text-align: left; }

.form-label { 
    display: block; 
    font-size: 10px; 
    font-weight: 800; 
    color: var(--glow); 
    margin-bottom: 6px; 
    text-transform: uppercase; 
    letter-spacing: 0.5px;
}

/* 確保 Input 有底色，唔會變透明 */
.form-input { 
    width: 100%; 
    padding: 12px; 
    border-radius: 10px; 
    border: 1.5px solid #eee; 
    background: #f9f9f7 !important; /* 淺灰底色，確保睇得到 */
    font-size: 14px; 
    font-weight: 600;
    color: var(--accent); 
    outline: none; 
    transition: all 0.2s;
}

/* 針對 ADD / EDIT 視窗入面粒大 Tag 掣 */
.tag-dropdown-wrapper { position: relative; width: 100%; margin-bottom: 10px; }

.tag-select { 
    appearance: none; 
    background: #f9f9f7; 
    border: 1.5px solid #eee; 
    border-radius: 10px; 
    padding: 12px 35px 12px 12px; 
    font-size: 14px; 
    font-weight: 800; 
    color: #b0bec5; 
    outline: none; 
    width: 100%; 
    cursor: pointer; 
}

/* 當揀咗 Tag 之後，粒掣要變色 (跟返你之前嘅 logic) */
.tag-select.has-val { 
    background: var(--palette-2-bg) !important; 
    border-color: var(--palette-2) !important; 
    color: var(--palette-2) !important; 
}

/* 補返 Dropdown 粒箭頭 */
.tag-dropdown-wrapper::after { 
    content: "▼"; 
    position: absolute; 
    right: 15px; 
    top: 50%; 
    transform: translateY(-50%); 
    font-size: 10px; 
    color: inherit; 
    pointer-events: none; 
}

/* 管理按鈕（UPDATE/DELETE） */
.manage-btn-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
.manage-btn-row .action-btn { 
    flex: 1; min-width: 120px; height: 50px; border: none; 
    font-size: 12px; font-weight: 900; border-radius: 12px; color: white; 
}
.btn-update { background: var(--accent); }
.btn-delete { background: var(--danger); }

/* 🚀 [V130.70] TAG 中心化索引 - 樣式修正 */
.view-toggle-container { padding: 10px 15px 20px 15px; display: flex; align-items: center; }

.checkbox-wrapper {
    display: flex; align-items: center; gap: 10px; padding: 10px 18px;
    border: 1.5px solid var(--accent); border-radius: 12px; cursor: pointer; user-select: none;
}
.checkbox-wrapper input { display: none; }
.custom-checkbox {
    width: 18px; height: 18px; border: 2px solid var(--accent);
    border-radius: 4px; position: relative;
}
.checkbox-wrapper input:checked + .custom-checkbox { background: var(--accent); }
.checkbox-wrapper input:checked + .custom-checkbox::after {
    content: '✓'; color: white; position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -55%); font-size: 12px; font-weight: 900;
}
.checkbox-label { font-size: 13px; font-weight: 900; color: var(--accent); letter-spacing: 1px; }

/* 摺疊組別：以 TAG 名稱為標題 */
.my-cards-group { border-bottom: 1px solid var(--line); width: 100%; overflow: hidden; margin-bottom: 5px; }
.my-cards-group summary { 
    padding: 18px 15px; font-weight: 900; font-size: 14px; color: var(--accent); 
    cursor: pointer; list-style: none; display: flex; align-items: center; background: #fafafa;
}
.my-cards-group summary::-webkit-details-marker { display: none; }
.my-cards-group summary::before { content: '▶'; font-size: 10px; margin-right: 10px; transition: 0.2s; color: var(--glow); }
.my-cards-group[open] summary::before { transform: rotate(90deg); }

/* 🚀 [V130.75] 動態 Grid 佈局 - 手機保證雙列，大屏自動排滿 */
.my-cards-grid-inner { 
    display: grid; 
    /* 核心修正：改用 auto-fill，令大螢幕可以放多過兩張卡 */
    grid-template-columns: repeat(auto-fill, 165px); 
    gap: 10px 8px; 
    padding: 10px 15px 20px 15px; 
    justify-content: start; 
    width: 100%;
}

@media screen and (max-width: 600px) {
    #my-cards-overlay .modal-content { width: 96% !important; min-width: 350px !important; border-radius: 20px; }
    #my-cards-overlay .modal-body { padding: 15px 5px !important; }
}

/* 🎯 [V131.30] 專屬修正：Detail 同 Edit 視窗入面粒評分掣對位 */
/* 1. 詳細內容視窗 (Detail) 粒掣 */
#det-recom-sticker {
    position: static !important; /* 核心：取消卡片嘅絕對定位 */
    width: 45px !important;
    height: 45px !important;
    flex-shrink: 0;
    margin-left: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px; /* 評分圖標大細 */
}

/* 2. 編輯視窗 (Edit) 粒掣 */
#ed-recom-sticker {
    position: static !important; /* 核心：取消絕對定位 */
    width: 40px !important;
    height: 40px !important;
    flex-shrink: 0;
    margin-left: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
}

/* 確保 Edit 視窗嗰行 Label 同粒掣垂直對齊 */
#edit-modal-body .form-group[style*="display:flex"] {
    display: flex !important;
    align-items: center !important;
    gap: 0; /* 靠 margin-left 控制粒掣距離 */
}
    </style>
</head>
<body onclick="void(0)">

    <div class="header-fixed-container">
        <div class="header-inner">
            <h1 class="app-title">FUKUOKA</h1>
            <div class="nav-row">
                <div class="search-pill-group">
                    <input type="text" id="search-input" class="search-input" placeholder="中文名 / 英文名 / 區域 / 類別內容 / Tag..." oninput="render()">
                    <div class="filter-trigger btn-bounce" onclick="openFilterModal()">FILTER</div>
                </div>
            </div>
            <div class="action-row">
                <div class="action-btn btn-bounce" onclick="alert('MAP 開發中')">MAP</div>
                <div class="action-btn btn-bounce" onclick="openTagsModal()">TAGS</div>
                <div class="action-btn btn-bounce" onclick="openAddModal()">ADD</div>
                <div class="action-btn btn-bounce" onclick="openMyCards()">MY CARDS</div>
            </div>
        </div>
        <div class="status-bar" id="status-display">讀取中...</div>
    </div>

    <main class="grid" id="card-grid"></main>

    <div id="tags-overlay" class="modal-overlay" onclick="closeTagsModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn btn-bounce" onclick="closeTagsModal()">✕</span>
            <div class="modal-body">
                <h2 style="font-weight:900; color:var(--accent); margin-bottom:20px;">TAGS MANAGEMENT</h2>
                <div style="display:flex; gap:10px; margin-bottom:20px;">
                    <button class="action-btn btn-bounce" style="flex:1; background:var(--accent); color:white; border:none;" onclick="createNewTag()">CREATE</button>
                    <button id="tag-del-label" class="action-btn btn-bounce" style="flex:1; background:var(--danger); color:white; border:none;" onclick="deleteSelectedTags()">DELETE (0)</button>
                </div>
                <div id="tag-list-container"></div>
            </div>
        </div>
    </div>

    <div id="my-cards-overlay" class="modal-overlay" onclick="closeModal('my-cards-overlay')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn btn-bounce" onclick="closeModal('my-cards-overlay')">✕</span>
            <div class="modal-body">
                <h2 style="margin-bottom:20px; font-weight:900; color:var(--accent);">MY CARDS (EDIT / REMOVE)</h2>
                <div class="grid" id="my-cards-grid"></div>
            </div>
        </div>
    </div>

    <div id="edit-overlay" class="modal-overlay" onclick="closeModal('edit-overlay')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn btn-bounce" onclick="closeModal('edit-overlay')">✕</span>
            <div class="modal-body" id="edit-modal-body"></div>
        </div>
    </div>

    <div id="detail-overlay" class="modal-overlay" onclick="closeModal('detail-overlay')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn btn-bounce" onclick="closeModal('detail-overlay')">✕</span>
            <div class="modal-body" id="det-content"></div>
        </div>
    </div>

    <div id="add-overlay" class="modal-overlay" onclick="closeModal('add-overlay')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-btn btn-bounce" onclick="closeModal('add-overlay')">✕</span>
            <div class="modal-body">
                <h2 style="margin-bottom:20px; font-weight:900; color:var(--accent);">ADD NEW SPOT</h2>
                <div id="add-tag-dropdown-container"></div>
                <div class="form-group" style="display:flex; align-items:center; gap:15px; margin-bottom:25px;">
                    <span class="form-label" style="margin-bottom:0">推薦評分</span>
                    <div id="add-recom-sticker" class="recom-sticker btn-bounce empty" style="position:static; width:40px; height:40px;" onclick="cycleAddRating()">待定</div>
                </div>
                <div class="form-group"><label class="form-label">中文名*</label><input type="text" class="form-input" id="in-cn" placeholder="必填欄位"></div>
                <div class="form-group"><label class="form-label">英文名</label><input type="text" class="form-input" id="in-en"></div>
                <div class="form-group"><label class="form-label">區域</label><input type="text" class="form-input" id="in-reg"></div>
                <div class="form-group"><label class="form-label">類別</label><input type="text" class="form-input" id="in-cat"></div>
                <div class="form-group"><label class="form-label">內容類別</label><input type="text" class="form-input" id="in-type"></div>
                <div class="form-group"><label class="form-label">重點介紹</label><input type="text" class="form-input" id="in-points"></div>
                <div class="form-group"><label class="form-label">鄰近參考</label><input type="text" class="form-input" id="in-nearby"></div>
                <div class="form-group"><label class="form-label">策展簡介</label><textarea class="form-input" id="in-intro" rows="2" style="resize:none"></textarea></div>
                <div class="form-group"><label class="form-label">參考連結</label><input type="text" class="form-input" id="in-ref"></div>

        let attractions = [], userRatings = {}, activeFilters = { tags: [], reg: [], cat: [], catType: [], recom: [] }, tempFilters = { tags: [], reg: [], cat: [], catType: [], recom: [] }, sectionStates = { tags: false, reg: false, cat: false, catType: false, recom: false };
        let tagDefs = [], spotToTags = {}, tagChecklist = new Set();
        const ICON_MAP = { '美食餐廳': '🍽️', '餐廳': '🍽️', '購物採買': '🛍️', '購物': '🛍️', '觀光名勝': '⛩️', '觀光': '⛩️', '主題體驗': '🎪', '主題': '🎪', '人氣打卡': '📸', '人氣': '📸', '隱密秘境': '🤫', '隱密': '🤫' };
        const uniqueRegs = ["博多", "天神", "中洲", "糸島", "熊本", "太宰府"];
        let tempAddRating = ''; 
        let isUserOnlyMode = false; 

        const getVal = (v, fallback) => (v && v.trim() !== "") ? v : fallback;
        const getIcon = (cat) => ICON_MAP[(cat || "").trim()] || '⭐';

        function initAppData() {
            const baseData = parseTSV(RAW_PASTED_DATA);
            let userSpots = [];
            try { userSpots = JSON.parse(localStorage.getItem('zine_user_spots') || '[]'); } catch(e) { userSpots = []; }
            attractions = [...userSpots.slice().reverse(), ...baseData];
            try { 
                userRatings = JSON.parse(localStorage.getItem('zine_ratings') || '{}'); 
                tagDefs = JSON.parse(localStorage.getItem('zine_tag_defs') || '[]'); 
                spotToTags = JSON.parse(localStorage.getItem('zine_spot_tags') || '{}'); 
            } catch(e) { }
        }

        // 🚀 [修復] 固定 ID 邏輯，確保存檔 Refresh 唔會消失
        function parseTSV(rawText) {
            if(!rawText || !rawText.trim()) return [];
            return rawText.trim().split(/\r?\n/).map((line, i) => {
                const cols = line.split('\t').map(c => c.trim().replace(/^"|"$/g, ''));
                if (i === 0 && (cols[0].includes("中文") || cols[2].includes("類別"))) return null;
                if (!cols[0]) return null;
                const safeId = "b-" + i + "-" + encodeURIComponent(cols[0].substring(0,3));
                return { id: safeId, cn: cols[0], en: cols[1], cat: cols[2], catType: cols[3], points: cols[4], reg: cols[5], nearby: cols[6], intro: cols[7], ref: cols[8], nav: cols[9], baseRecom: cols[10] };
            }).map(item => item ? { ...item, icon: getIcon(item.cat) } : null).filter(item => item !== null);
        }

        function generateCardHtml(item, clickFnOverride = null) {
            const rating = userRatings[item.id] !== undefined ? userRatings[item.id] : (item.baseRecom || '');
            const idx = (uniqueRegs.findIndex(r => (item.reg || "").includes(r)) % 5) + 1;
            const tId = spotToTags[item.id];
            const tDef = tagDefs.find(d => d.id === tId);
            const tagHtml = (tDef && tDef.name) ? `<div class="card-tag-row active"><span class="tag-mini-pill">${tDef.name}</span></div>` : `<div class="card-tag-row"></div>`;
            const clickFn = clickFnOverride || `openDetail('${item.id}')`;
            return `<div class="card btn-bounce" onclick="${clickFn}">
                <div class="reg-rect-tag" style="background:var(--palette-${idx > 0 ? idx : 1})">${getVal(item.reg, "未指定")}</div>
                <div class="recom-sticker btn-bounce ${rating ? 'rated' : 'empty'}" onclick="event.stopPropagation(); toggleRating('${item.id}')">${{ '1': '🔍', '2': '👍', '3': '🙋', '': '未評' }[rating]}</div>
                <div class="title-row"><span class="card-icon">${getIcon(item.cat)}</span><span class="name-cn">${item.cn}</span></div>
                <span class="name-en">${getVal(item.en, "---")}</span>
                ${tagHtml}
                <div class="card-bottom-text">${getVal(item.catType, "---")}</div>
            </div>`;
        }

        function render() {
            const grid = document.getElementById('card-grid');
            if (!grid) return;
            const query = (document.getElementById('search-input').value || "").normalize('NFC').trim().toLowerCase();
            const sel = activeFilters;
            let count = 0;
            grid.innerHTML = attractions.map(item => {
                const rating = userRatings[item.id] !== undefined ? userRatings[item.id] : (item.baseRecom || '');
                if (rating === '0') return '';
                const itemTagId = spotToTags[item.id] || "untagged";
                const matchTag = (sel.tags.length === 0 || sel.tags.includes(itemTagId));
                const tDef = tagDefs.find(d => String(d.id) === String(itemTagId));
                const tagName = (tDef && tDef.name) ? String(tDef.name).normalize('NFC') : "";
                const searchStr = [item.cn, item.en, item.reg, item.cat, item.catType, tagName].map(v => (v || "").normalize('NFC').toLowerCase()).join(" ");
                const match = matchTag && (sel.reg.length === 0 || sel.reg.includes(item.reg)) && (sel.cat.length === 0 || sel.cat.includes(item.cat)) && (sel.catType.length === 0 || sel.catType.includes(item.catType)) && (sel.recom.length === 0 || sel.recom.includes(rating)) && (searchStr.includes(query));
                if (!match) return '';
                count++; return generateCardHtml(item);
            }).join('');
            
            const totalRegs = [...new Set(attractions.map(a => a.reg))].filter(v=>v).length;
            const totalCats = [...new Set(attractions.map(a => a.cat))].filter(v=>v).length;
            document.getElementById('status-display').innerHTML = `<span class="status-item">[${count}/${attractions.length}] 景點</span><span class="status-item">[${sel.tags.length || tagDefs.length}/${tagDefs.length}] 標籤</span><span class="status-item">[${sel.reg.length || totalRegs}/${totalRegs}] 區域</span>`;
        }

        // --- TAGS 管理 ---
        function openTagsModal() { tagChecklist.clear(); refreshTagList(); openModal('tags-overlay'); }
        function closeTagsModal() { tagDefs = tagDefs.filter(d => d.name && d.name.trim() !== ""); saveTags(); render(); closeModal('tags-overlay'); }
        function createNewTag() {
            const id = 't-' + Date.now(); tagDefs.unshift({ id, name: '' }); refreshTagList();
            const inp = document.getElementById(`inp-${id}`); const btn = document.getElementById(`eb-${id}`);
            if (inp && btn) { inp.readOnly = false; inp.focus(); btn.innerText = "SAVE"; btn.style.color = "var(--palette-1)"; }
        }
        function refreshTagList() {
            const container = document.getElementById('tag-list-container');
            if(!container) return;
            container.innerHTML = tagDefs.map(tag => `<div class="tag-row"><input type="checkbox" style="width:18px; height:18px;" onchange="updateTagCheck('${tag.id}', this.checked)"><input type="text" class="tag-input" id="inp-${tag.id}" value="${tag.name}" placeholder="輸入名稱..." readonly><div class="tag-edit-btn btn-bounce" id="eb-${tag.id}" onclick="toggleTagEdit('${tag.id}')">EDIT</div></div>`).join('');
            updateDelLabel();
        }
        function toggleTagEdit(id) {
            const inp = document.getElementById(`inp-${id}`), btn = document.getElementById(`eb-${id}`);
            if (!inp || !btn) return;
            if (inp.readOnly) { inp.readOnly = false; inp.focus(); btn.innerText = "SAVE"; } else {
                const val = inp.value.trim(); if (!val) return;
                inp.readOnly = true; btn.innerText = "EDIT";
                tagDefs.find(x => x.id === id).name = val; saveTags(); initFilters(); render(); 
            }
        }
        function updateTagCheck(id, val) { if(val) tagChecklist.add(id); else tagChecklist.delete(id); updateDelLabel(); }
        function updateDelLabel() { document.getElementById('tag-del-label').innerText = `DELETE (${tagChecklist.size})`; }
        function deleteSelectedTags() {
            if(tagChecklist.size === 0 || !confirm("確定刪除？")) return;
            tagDefs = tagDefs.filter(d => !tagChecklist.has(d.id));
            Object.keys(spotToTags).forEach(sid => { if(tagChecklist.has(spotToTags[sid])) delete spotToTags[sid]; });
            tagChecklist.clear(); saveTags(); refreshTagList(); render();
        }
        function saveTags() { localStorage.setItem('zine_tag_defs', JSON.stringify(tagDefs)); localStorage.setItem('zine_spot_tags', JSON.stringify(spotToTags)); }
        
        function assignTag(sid, tid) {

        // --- 🧪 Filter UI (恢復全功能) ---
        function initFilters() {
            const container = document.getElementById('dynamic-filter-container'); if(!container) return;
            const getLinkedData = (key) => {
                const filteredSubset = attractions.filter(item => {
                    const itemTag = spotToTags[item.id] || "untagged";
                    const rating = userRatings[item.id] !== undefined ? userRatings[item.id] : (item.baseRecom || '');
                    return (key === 'tags' || tempFilters.tags.length === 0 || tempFilters.tags.includes(itemTag)) &&
                           (key === 'reg' || tempFilters.reg.length === 0 || tempFilters.reg.includes(item.reg)) &&
                           (key === 'cat' || tempFilters.cat.length === 0 || tempFilters.cat.includes(item.cat)) &&
                           (key === 'catType' || tempFilters.catType.length === 0 || tempFilters.catType.includes(item.catType)) &&
                           (key === 'recom' || tempFilters.recom.length === 0 || tempFilters.recom.includes(rating));
                });
                if (key === 'tags') {
                    const currentValidIds = [...new Set(filteredSubset.map(i => spotToTags[i.id] || "untagged"))];
                    return [{v: "untagged", n: "🚫 未設定標籤", disabled: !currentValidIds.includes("untagged")}, ...tagDefs.map(d => ({v: d.id, n: d.name, disabled: !currentValidIds.includes(d.id)}))];
                }
                if (key === 'recom') {
                    const avail = [...new Set(filteredSubset.map(i => userRatings[i.id] !== undefined ? userRatings[i.id] : (i.baseRecom || '')))];
                    return [{v:"1",n:"🔍 探索"},{v:"2",n:"👍 認眼"},{v:"3",n:"必去🙋"},{v:"",n:"未評測"}].map(opt => ({...opt, disabled: !avail.includes(opt.v)}));
                }
                const availVals = [...new Set(filteredSubset.map(i => i[key]).filter(v=>v))];
                return [...new Set(attractions.map(i => i[key]).filter(v=>v))].sort().map(v => ({v, n: v, disabled: !availVals.includes(v)}));
            };
            const labels = { tags: "行程標籤 (TAG)", reg: "區域", cat: "類別", catType: "類別內容", recom: "推薦評分" };
            container.innerHTML = Object.keys(labels).map(key => {
                const isOpen = sectionStates[key], items = getLinkedData(key), isAllSelected = tempFilters[key].length === 0;
                return `<div class="filter-section ${isOpen?'open':''}">
                    <div class="filter-header btn-bounce" onclick="toggleSec('${key}')"><span>${labels[key]}</span><span class="filter-arrow">▶</span></div>
                    <div class="filter-expand-area" style="display: ${isOpen ? 'block' : 'none'}">

                        <div class="pill-box">${items.map(opt => `<div class="pill btn-bounce ${isAllSelected || tempFilters[key].includes(opt.v)?'active':''} ${opt.disabled?'disabled':''}" onclick="togglePill('${key}','${opt.v}')">${opt.n}</div>`).join('')}</div>
                    </div></div>`;
            }).join('');
        }
        function toggleSec(k){ sectionStates[k]=!sectionStates[k]; initFilters(); }
        function toggleMaster(k){ tempFilters[k] = tempFilters[k].length === 0 ? ["__NONE__"] : []; initFilters(); }
        function togglePill(k, v){
            if (tempFilters[k].length === 0) {
                if (k === 'tags') tempFilters[k] = ["untagged", ...tagDefs.map(d => d.id)];
                else if (k === 'recom') tempFilters[k] = ["1","2","3",""];
                else tempFilters[k] = [...new Set(attractions.map(a => a[k]))];

            const idx = tempFilters[k].indexOf(v);

            if (tempFilters[k].length === 0) tempFilters[k] = [];
            initFilters();
        }

                <div class="form-group"><label class="form-label">區域</label><input type="text" class="form-input" id="ed-reg" value="${getVal(item.reg,'')}"></div>
                <div class="form-group"><label class="form-label">類別</label><input type="text" class="form-input" id="ed-cat" value="${getVal(item.cat,'')}"></div>
                <div class="form-group"><label class="form-label">內容類別</label><input type="text" class="form-input" id="ed-type" value="${getVal(item.catType,'')}"></div>
                <div class="form-group"><label class="form-label">導航連結*</label><input type="text" class="form-input" id="ed-nav" value="${getVal(item.nav,'')}"></div>
                <div class="manage-btn-row"><button class="action-btn btn-update btn-bounce" onclick="updateSpot('${item.id}')">UPDATE DATA</button><button class="action-btn btn-delete btn-bounce" onclick="deleteSpot('${item.id}')">DELETE</button></div>`;
            openModal('edit-overlay');
        }

        function saveSpot() {
            const cn = document.getElementById('in-cn').value.trim(), nav = document.getElementById('in-nav').value.trim();
            if(!cn || !nav) { alert("中文名同導航連結係必填！"); return; }
            const newId = "user-" + Date.now();
            const newSpot = { id: newId, cn, nav, baseRecom: tempAddRating, en: document.getElementById('in-en').value, reg: document.getElementById('in-reg').value, cat: document.getElementById('in-cat').value, catType: document.getElementById('in-type').value, points: document.getElementById('in-points').value, nearby: document.getElementById('in-nearby').value, intro: document.getElementById('in-intro').value, ref: document.getElementById('in-ref').value };
            let list = JSON.parse(localStorage.getItem('zine_user_spots') || '[]'); list.push(newSpot);
            localStorage.setItem('zine_user_spots', JSON.stringify(list));
            const selTag = document.getElementById('in-tag-select').value;
            if(selTag) { spotToTags[newId] = selTag; saveTags(); }
            closeModal('add-overlay'); initAppData(); render();
        }

        function updateSpot(id) {
            const cn = document.getElementById('ed-cn').value.trim(), nav = document.getElementById('ed-nav').value.trim();
            if(!cn || !nav) { alert("必填項目不可為空！"); return; }
            let list = JSON.parse(localStorage.getItem('zine_user_spots') || '[]');
            const idx = list.findIndex(a => String(a.id) === String(id));
            if(idx > -1) { 
                list[idx] = { ...list[idx], cn, nav, baseRecom: tempAddRating, en: document.getElementById('ed-en').value, reg: document.getElementById('ed-reg').value, cat: document.getElementById('ed-cat').value, catType: document.getElementById('ed-type').value };
                localStorage.setItem('zine_user_spots', JSON.stringify(list)); 
                userRatings[id] = tempAddRating; localStorage.setItem('zine_ratings', JSON.stringify(userRatings)); 
                closeModal('edit-overlay'); initAppData(); render(); openMyCards(false); 
            }
        }

        // --- 🚀 MY CARDS 記憶摺疊邏輯 ---
        function openMyCards(isFreshOpen = false) {
            const modalOverlay = document.getElementById('my-cards-overlay');
            const modalBody = modalOverlay.querySelector('.modal-body');
            const openStates = {};
            if (!isFreshOpen) {
                modalBody.querySelectorAll('details').forEach(det => {
                    const label = det.querySelector('summary').textContent.split('(')[0].trim();
                    openStates[label] = det.open;
                });
            }
            let html = `<h2 style="margin: 0 15px 10px 15px; font-weight:900;">MY CARDS</h2>
                <div class="view-toggle-container"><label class="checkbox-wrapper"><input type="checkbox" id="user-only-check" ${isUserOnlyMode?'checked':''} onchange="toggleMyCardsFilter(this.checked)"><div class="custom-checkbox"></div><span class="checkbox-label">MY CARDS ONLY</span></label></div>`;
            if (tagDefs.length === 0) { html += `<p style='text-align:center; padding:40px;'>暫無標籤</p>`; } 
            else {
                [...tagDefs].sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant')).forEach(tag => {
                    let cards = attractions.filter(a => spotToTags[a.id] === tag.id);
                    if (isUserOnlyMode) cards = cards.filter(a => a.id.startsWith('user-'));
                    const isOpen = (!isFreshOpen && openStates[tag.name]) ? 'open' : '';
                    html += `<details class="my-cards-group" ${isOpen}><summary>${tag.name} (${cards.length})</summary><div class="my-cards-grid-inner">
                        ${cards.length > 0 ? cards.map(item => generateCardHtml(item, item.id.startsWith('user-') ? `openEditModal('${item.id}')` : `openDetail('${item.id}')`)).join('') : '<p style="font-size:11px; color:#ccc; padding:15px; grid-column:1/-1;">(0) 暫無卡片</p>'}
                    </div></details>`;
                });
            }
            modalBody.innerHTML = html; openModal('my-cards-overlay');
        }

        function toggleMyCardsFilter(checked) { isUserOnlyMode = checked; openMyCards(false); }

        // --- 通用輔助 ---
        function applyFilters(){ activeFilters = JSON.parse(JSON.stringify(tempFilters)); render(); closeModal('filter-overlay'); }
        function resetAllFilters(){ tempFilters = { tags: [], reg: [], cat: [], catType: [], recom: [] }; initFilters(); }
        function openFilterModal(){ tempFilters = JSON.parse(JSON.stringify(activeFilters)); initFilters(); openModal('filter-overlay'); }
        function deleteSpot(id) { if(confirm("確定刪除？")) { let list = JSON.parse(localStorage.getItem('zine_user_spots') || '[]'); list = list.filter(a => String(a.id) !== String(id)); localStorage.setItem('zine_user_spots', JSON.stringify(list)); delete spotToTags[id]; saveTags(); initAppData(); render(); closeModal('edit-overlay'); openMyCards(false); } }
        function toggleRating(id) { const m={'':'1','1':'2','2':'3','3':''}; userRatings[id] = m[userRatings[id]||'']; localStorage.setItem('zine_ratings', JSON.stringify(userRatings)); render(); if(document.getElementById('my-cards-overlay').classList.contains('active')) openMyCards(false); }
        function cycleAddRating() { const m={'':'1','1':'2','2':'3','3':''}; tempAddRating=m[tempAddRating]; const s=document.getElementById('add-recom-sticker'); s.innerText={'1':'🔍','2':'👍','3':'🙋','':'待定'}[tempAddRating]; s.className=`recom-sticker btn-bounce ${tempAddRating?'rated':'empty'}`; }
        function cycleEditRating() { const m={'':'1','1':'2','2':'3','3':''}; tempAddRating=m[tempAddRating]; const s=document.getElementById('ed-recom-sticker'); s.innerText={'1':'🔍','2':'👍','3':'🙋','':'待定'}[tempAddRating]; s.className=`recom-sticker btn-bounce ${tempAddRating?'rated':'empty'}`; }
        function openModal(id) { const el = document.getElementById(id); el.style.display = 'flex'; setTimeout(()=>el.classList.add('active'), 10); }
        function closeModal(id) { const el = document.getElementById(id); el.classList.remove('active'); setTimeout(()=>el.style.display = 'none', 300); }

        window.onload = function() { initAppData(); render(); };

		
    </script>
</body>
</html>
